<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dell | Employee Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-image: 
                              url('https://static.vecteezy.com/system/resources/previews/072/129/381/non_2x/pale-blue-and-white-geometric-shapes-create-a-modern-abstract-background-with-depth-free-photo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Roboto', Arial, sans-serif;
        }
        .dell-blue { background-color: #0672CB; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-[420px] bg-white/95 backdrop-blur-sm p-10 border border-gray-300 shadow-2xl relative">
        <div class="absolute top-0 left-0 w-full h-[5px] dell-blue"></div>
        
        <h1 class="text-2xl font-light text-gray-800 mb-8 uppercase tracking-widest text-center">Employee Sign In</h1>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1 tracking-tighter">Email Address</label>
                <input type="email" id="email" required class="w-full p-2 border border-gray-400 rounded-none focus:border-[#0672CB] outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1 tracking-tighter">Password</label>
                <input type="password" id="password" required class="w-full p-2 border border-gray-400 rounded-none focus:border-[#0672CB] outline-none transition-all">
            </div>
            
            <button type="submit" class="w-full dell-blue text-white py-3 font-bold rounded-none hover:bg-[#004A77] transition-all tracking-widest">
                SIGN IN
            </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-200 pt-6">
            <p class="text-sm text-gray-600">
                New Employee? 
                <a href="signupgdg.html" class="text-[#0672CB] font-bold ml-1 hover:underline">Create an account</a>
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nxivdzswpepzlsyquxre.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_oMksbpeu4z3k6Q0ot_Dkrg_ZBEu8lFO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Access Denied: " + error.message);
            } else {
                alert("Login Successful! Welcome, " + (data.user.user_metadata.full_name || 'Employee'));
                // window.location.href = "dashboard.html"; 
            }
        });
    </script>
</body>
</html>
